general {
disable_loading_bar = true
hide_cursor = true
grace = 0
}

################################
### BACKGROUND & TRANSITION  ###
################################
background {
    monitor =
    path = screenshot
    
    # Frosted glass effect settings
    blur_passes = 3       # How many times to blur (more = smoother but heavier)
    blur_size = 8         # The radius of the blur
    noise = 0.0117        # Adds a slight film-grain to prevent color banding
    contrast = 0.8916
    brightness = 0.8      # Slightly dim the screen to make the white text pop
    vibrancy = 0.1696     # Slightly boosts the underlying colors
    vibrancy_darkness = 0.0
}

##########################
### TIME & DATE        ###
##########################
# Clean, large time display (using built-in $TIME saves battery)
label {
monitor =
text = $TIME
color = rgb(B3B1AD)
font_size = 80
font_family = JetBrains Mono Nerd Font, Bold
position = 0, 260
halign = center
valign = center
}

# Consolidated Date
label {
monitor =
text = cmd[update:3600000] date +"%A, %d %B %Y"
color = rgba(179, 177, 173, 0.8)
font_size = 18
font_family = SF Pro Display
position = 0, 180
halign = center
valign = center
}

##########################
### PROFILE PICTURE    ###
##########################
image {
monitor =
path = /var/lib/AccountsService/icons/$USER
size = 120
rounding = -1
border_size = 2
border_color = rgb(dddddd) # Cyan border to match the input field
position = 0, 60
halign = center
valign = center
}

##########################
### PASSWORD PROMPT    ###
##########################
input-field {
monitor =
size = 300, 50
outline_thickness = 2
dots_size = 0.33
dots_spacing = 0.15
dots_center = true
dots_rounding = -1

# CachyOS Modern Theme Colors
outer_color = rgb(dddddd)
inner_color = rgb(0A0E14)
font_color = rgb(B3B1AD)

fade_on_empty = true
fade_timeout = 1000
placeholder_text = <i>Input Password...</i>
hide_input = false
rounding = -1

# State Colors
check_color = rgb(C2D94C) # Green on check
fail_color = rgb(F07178)  # Red on fail
fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
fail_transition = 300

position = 0, -60
halign = center
valign = center
}

################################
### PIMPED MUSIC WIDGET      ###
################################

# 1. Album Art
image {
    monitor =
    path = 
    reload_time = 2
    reload_cmd = ~/.config/hypr/scripts/music_progress.sh art
    size = 110
    rounding = 15
    border_size = 2
    border_color = rgb(dddddd) # Cyan border matches the password field
    position = 0, -170
    halign = center
    valign = center
}

# 2. Track Title
label {
    monitor =
    text = cmd[update:2000] ~/.config/hypr/scripts/music_progress.sh title
    font_size = 16
    font_family = SF Pro Display Bold
    color = rgb(FFFFFF)
    position = 0, -250
    halign = center
    valign = center
}

# 3. Artist
label {
    monitor =
    text = cmd[update:2000] ~/.config/hypr/scripts/music_progress.sh artist
    font_size = 14
    font_family = SF Pro Display
    color = rgb(39BAE6) # Cyan accent
    position = 0, -275
    halign = center
    valign = center
}

# 4. Progress Bar (MM:SS ━━━━┈┈┈┈ MM:SS)
label {
    monitor =
    text = cmd[update:1000] ~/.config/hypr/scripts/music_progress.sh progress
    font_size = 16
    position = 0, -310
    halign = center
    valign = center
}

####################### 
###  BOTTOM LABELS  ###
#######################
# Bottom Left: User & Hostname
label {
monitor =
text = cmd[update:86400000] echo "   $USER @ $(uname -n)"
color = rgba(179, 177, 173, 0.5)
font_size = 13
font_family = SF Pro Display
position = 30, 20
halign = left
valign = bottom
}

# Bottom Right: Battery & Uptime
label {
monitor =
text = cmd[update:10000] echo "󰁹 $(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1)%   |   󰔛 $(uptime -p | sed 's/up //')"
color = rgba(179, 177, 173, 0.5)
font_size = 13
font_family = SF Pro Display
position = -30, 20
halign = right
valign = bottom
}
