general {
    lock_cmd = pidof hyprlock || hyprlock       # Avoid starting multiple instances
    before_sleep_cmd = loginctl lock-session    # Ensure it locks BEFORE the system goes to sleep
    after_sleep_cmd = hyprctl dispatch dpms on  # Instantly wake monitors when waking from sleep
}

# 1. Dim Screen & Send Notification (5 Minutes)
listener {
    timeout = 300
    # Save current brightness, dim to minimum, and send a high-priority notification
    on-timeout = brightnessctl -s set 10 & notify-send "System Idle" "Locking screen in 30 seconds..." -u critical -i dialog-warning -t 10000
    # Restore brightness if you move the mouse before it locks
    on-resume = brightnessctl -r
}

# 2. Lock the Screen (5.5 Minutes)
listener {
    timeout = 330
    on-timeout = loginctl lock-session
}

# 3. Turn off Displays (6 Minutes)
listener {
    timeout = 360
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# 4. Suspend System (15 Minutes)
listener {
    timeout = 900
    on-timeout = systemctl suspend
}
