
# ---------------------------------------------------------
# Environmental variables
# ---------------------------------------------------------
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORMTHEME,qt6ct 
env = OZONE_PLATFORM,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = NIXOS_OZONE_WL,1

# --------------------------
# XWayland compromises
# --------------------------
xwayland {
	force_zero_scaling = true
}
env = GDK_SCALE,1
env = GDK_DPI_SCALE,1
env = XCURSOR_SIZE,24

monitor = ,preferred,auto,auto


# ---------------------------------------------------------
# I/O devices
# ---------------------------------------------------------

input {
    kb_layout = us,pl
    kb_options = grp:win_space_toggle
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
	scroll_factor = 0.2
    }
    sensitivity = 0 
}

# ---------------------------------------------------------
# Static processes %ToDo% - refactor
# ---------------------------------------------------------
exec-once = systemctl --user start graphical-session.target
exec-once = gsettings set org.gnome.desktop.interface gtk-theme Andromeda
exec-once = gsettings set org.gnome.desktop.wm.preferences theme Andromeda 

# ---------------------------------------------------------
# Aesthetics
# ---------------------------------------------------------
source = ~/.config/hypr/aesthetic.conf

dwindle {
    preserve_split = yes 
}

windowrule = match:class .*, suppress_event maximize
windowrule = match:class ^(code-url-handler)$, opacity 0.85 override
windowrule = match:class ^(kitty)$, opacity 0.85 override

# dashlet tui apps for waybar
windowrule = match:class ^(float_tui)$, float on
windowrule = match:class ^(float_tui)$, dim_around on
windowrule = match:class ^(float_tui)$, size 60% 50%
windowrule = match:class ^(float_tui)$, move 100%-w-20 50

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.1, match:namespace waybar

# ---------------------------------------------------------
# Bindings
# ---------------------------------------------------------

# ---------------------------
# Consts
# ---------------------------

$mainMod = SUPER
$terminal = kitty 
$browser = zen-browser
$editor = code 
$fileManager = nautilus
$appLauncher =  ~/.config/rofi/app_launcher.sh 
$clipboard = ~/.config/rofi/clipboard_launcher.sh
$wallpaper = ~/.config/hypr/scripts/wallpaper_switch.sh
$resetScript = ~/.config/hypr/scripts/input_reset.sh

bind = $mainMod, Q, killactive, 

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $appLauncher
bind = $mainMod, V, exec, $clipboard
bind = $mainMod, C, exec, $editor
bind = $mainMod, W, exec, $wallpaper
bind = $mainMod, BACKSPACE, exec, hyprlock
bind = $mainMod, SHIFT T, exec, $resetScript
bind = $mainMod SHIFT CTRL, M, exit, 

# dwindle 
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, L, layoutmsg, swapsplit
bind = $mainMod, K, togglefloating, 

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Scroll through existing workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, down, workspace, e-1
bind = $mainMod, up, workspace, e+1

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, code:10, movetoworkspace, 1
bind = $mainMod SHIFT, code:11, movetoworkspace, 2
bind = $mainMod SHIFT, code:12, movetoworkspace, 3
bind = $mainMod SHIFT, code:13, movetoworkspace, 4
bind = $mainMod SHIFT, code:14, movetoworkspace, 5
bind = $mainMod SHIFT, code:15, movetoworkspace, 6
bind = $mainMod SHIFT, code:16, movetoworkspace, 7
bind = $mainMod SHIFT, code:17, movetoworkspace, 8
bind = $mainMod SHIFT, code:18, movetoworkspace, 9
bind = $mainMod SHIFT, code:19, movetoworkspace, 10

# Move focused window around
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Special workspaces 
bind = $mainMod, S, togglespecialworkspace, spotify
bind = $mainMod SHIFT, S, movetoworkspace, special:spotify
bind = $mainMod, X, togglespecialworkspace, terminal
bind = $mainMod SHIFT, X, movetoworkspace, special:terminal


# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Resize submap
bind = ALT, R, submap, resize
submap = resize
binde = , right, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , up, resizeactive, 0 -10
binde = , down, resizeactive, 0 10

# Global submap
bind = , escape, submap, reset 
submap = reset

# ---------------------------------------------------------
# 📸 SCREENSHOT KEYBINDS
# ---------------------------------------------------------

# 1. Full Screen -> Clipboard
# Key: Print Screen
bind = , Print, exec, grim - | wl-copy && notify-send "📸 Screenshot Taken" "Full screen copied to clipboard" -u normal -t 3000

# 2. Select Region -> Clipboard (Like Windows Snip / Mac CMD+Shift+4)
# Key: Super + Shift + S
bind = ALT SHIFT, S, exec, grim -g "$(slurp -d)" - | wl-copy && notify-send "📸 Region Captured" "Copied to clipboard" -u normal -t 3000

# 3. Select Region -> Open Editor (For drawing arrows, blurring, or saving to disk)
# Key: Super + Ctrl + S
bind = ALT CTRL, S, exec, grim -g "$(slurp -d)" - | swappy -f -

# Audio controlling
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

# Monitor brightness controls
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +10%
