[[themes]]
name = "Blue whale"

[themes.palette]
# Deep dark slate background (blends perfectly if Kitty has slight transparency)
background = "#0A0E14" 
foreground = "#B3B1AD"

# Standard ANSI colors tuned for a modern Arch/Hyprland aesthetic
black = "#0A0E14"
red = "#F07178"
green = "#C2D94C"      # Vibrant Spotify/CachyOS Green
yellow = "#FFCB6B"
blue = "#82AAFF"
magenta = "#C792EA"
cyan = "#39BAE6"       # Sharp Teal/Cyan for accents
white = "#B3B1AD"

# Bright ANSI variants for highlights
bright_black = "#303640"
bright_red = "#FF8B92"
bright_green = "#DDFFA7"
bright_yellow = "#FFE585"
bright_blue = "#9CC4FF"
bright_magenta = "#E1ACFF"
bright_cyan = "#A3F7FF"
bright_white = "#FFFFFF"

[themes.component_style]
# Titles and Borders
block_title = { fg = "#39BAE6", modifiers = ["Bold"] }
table_header = { fg = "#39BAE6", modifiers = ["Bold", "Underlined"] }

# Playback Window Elements
playback_status = { fg = "#C2D94C", modifiers = ["Bold"] }
playback_track = { fg = "#FFFFFF", modifiers = ["Bold"] }
playback_artists = { fg = "#39BAE6" }
playback_album = { fg = "#C792EA", modifiers = ["Italic"] }
playback_genres = { fg = "#303640", modifiers = ["Dim"] }
playback_metadata = { fg = "#303640" }

# Progress Bar
playback_progress_bar = { bg = "#0A0E14", fg = "#C2D94C" }
playback_progress_bar_unfilled = { bg = "#0A0E14", fg = "#303640" }

# Library and Navigation Lists
current_playing = { fg = "#DDFFA7", modifiers = ["Bold"] }
selection = { bg = "#303640", fg = "#FFFFFF", modifiers = ["Bold"] }
secondary_row = { fg = "#B3B1AD", modifiers = ["Dim"] }
page_desc = { fg = "#82AAFF", modifiers = ["Bold"] }
playlist_desc = { fg = "#303640", modifiers = ["Italic"] }

# Contextual Popups
like = { fg = "#F07178", modifiers = ["Bold"] }
lyrics_playing = { fg = "#A3F7FF", modifiers = ["Bold"] }
lyrics_played = { fg = "#303640", modifiers = ["Dim"] }
